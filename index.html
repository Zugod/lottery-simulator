<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lottery Simulator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #222;
      margin: 0;
      padding: 40px 20px;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 32px;
    }

    p {
      color: #555;
    }

    .inputs {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin: 20px 0;
    }

    input {
      width: 70px;
      padding: 12px;
      font-size: 18px;
      text-align: center;
      border: 1px solid #ccc;
      border-radius: 10px;
    }

    button {
      background: #111;
      color: white;
      border: none;
      padding: 14px 22px;
      font-size: 16px;
      border-radius: 12px;
      cursor: pointer;
    }

    button:hover {
      background: #333;
    }

    #result {
      margin-top: 25px;
      padding: 20px;
      background: #f0f4f8;
      border-radius: 12px;
      font-size: 18px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Lottery Simulator</h1>
    <p>Enter 6 numbers and run a simulation to see how long it could take to hit the jackpot.</p>

    <div class="inputs">
      <input id="n1" type="number" min="1" max="49" placeholder="1" />
      <input id="n2" type="number" min="1" max="49" placeholder="2" />
      <input id="n3" type="number" min="1" max="49" placeholder="3" />
      <input id="n4" type="number" min="1" max="49" placeholder="4" />
      <input id="n5" type="number" min="1" max="49" placeholder="5" />
      <input id="n6" type="number" min="1" max="49" placeholder="6" />
    </div>

    <button onclick="simulate()">Run simulation</button>

    <div id="result">Your result will appear here.</div>
  </div>

  <script>
    function drawNumbers() {
      let numbers = [];

      while (numbers.length < 6) {
        let n = Math.floor(Math.random() * 49) + 1;
        if (!numbers.includes(n)) {
          numbers.push(n);
        }
      }

      numbers.sort((a, b) => a - b);
      return numbers;
    }

    function arraysEqual(a, b) {
      return a.length === b.length && a.every((val, i) => val === b[i]);
    }

    function simulate() {
      let user = [
        Number(document.getElementById("n1").value),
        Number(document.getElementById("n2").value),
        Number(document.getElementById("n3").value),
        Number(document.getElementById("n4").value),
        Number(document.getElementById("n5").value),
        Number(document.getElementById("n6").value)
      ];

      if (user.some(n => n < 1 || n > 49 || !Number.isInteger(n))) {
        document.getElementById("result").innerHTML = "Please enter 6 valid numbers between 1 and 49.";
        return;
      }

      let unique = new Set(user);
      if (unique.size !== 6) {
        document.getElementById("result").innerHTML = "Please enter 6 different numbers.";
        return;
      }

      user.sort((a, b) => a - b);

      let draws = 0;

      while (true) {
        draws++;
        let draw = drawNumbers();

        if (arraysEqual(draw, user)) {
          let years = draws / 2 / 52;
          let spent = draws * 30;

          document.getElementById("result").innerHTML =
            `<strong>Jackpot hit in this simulation after:</strong><br>
            ${draws.toLocaleString()} draws<br><br>
            <strong>Approximate time:</strong><br>
            ${years.toFixed(1)} years<br><br>
            <strong>Money spent at 30 CZK per ticket:</strong><br>
            ${spent.toLocaleString()} CZK`;
          break;
        }
      }
    }
  </script>
</body>
</html>
